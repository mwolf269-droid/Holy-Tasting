<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLY Tasting App v5.1</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --border: #e2e8f0;
            --star-active: #ffb300;
            --star-inactive: #cbd5e1;
            --add-btn-bg: #e2e8f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f8fafc;
                --text-muted: #94a3b8;
                --primary: #3b82f6;
                --border: #334155;
                --star-inactive: #475569;
                --add-btn-bg: #334155;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 80px;
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
            text-align: center;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        .pwa-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 16px;
            width: 100%;
            display: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0 12px 0;
        }

        .category-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
        }

        .btn-add-flavor {
            background: var(--add-btn-bg);
            color: var(--text-main);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
        }

        .flavor-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .flavor-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .flavor-info h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .flavor-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-badge {
            font-size: 0.75rem;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            border: 1px solid rgba(34, 197, 94, 0.2);
            display: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
        }

        .modal {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 24px 16px 40px 16px;
            border: 1px solid var(--border);
            border-bottom: none;
        }

        .rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .star {
            font-size: 1.6rem;
            color: var(--star-inactive);
            cursor: pointer;
        }

        .star.active {
            color: var(--star-active);
        }

        textarea, .input-field {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            background: var(--bg-color);
            color: var(--text-main);
        }

        textarea {
            height: 80px;
            margin-top: 10px;
            resize: none;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .main-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            text-align: center;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--border); color: var(--text-main); }
        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            width: 100%;
        }

        .mgmt-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mgmt-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .mgmt-row {
            display: flex;
            gap: 10px;
        }

        .btn-mgmt {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>🥤 My HOLY Tasting Tracker</h1>
    </header>

    <div class="container">
        <button id="installBtn" class="pwa-btn">📲 App auf dem Handy installieren</button>
        
        <div id="app-content">Lädt Sortenliste...</div>

        <div class="mgmt-section">
            <div class="mgmt-title">⚙️ Daten & App Verwaltung</div>
            <button class="btn-mgmt" onclick="updateAppVersion()">🔄 App auf neueste Version updaten (Daten bleiben erhalten)</button>
            <div class="mgmt-row">
                <button class="btn-mgmt" onclick="exportBackup()">📤 JSON Export</button>
                <button class="btn-mgmt" onclick="triggerImportInput()">📥 JSON Import</button>
            </div>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBackup(this)">
        </div>
    </div>

    <!-- Modal für Bewertung -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalFlavorName">Sorte</h2>
            <p id="modalFlavorDesc" style="color: var(--text-muted); margin-bottom: 15px;"></p>
            
            <div class="rating-row"><span>👃 Geruch</span><div class="stars" data-metric="geruch"><span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span></div></div>
            <div class="rating-row"><span>👅 Geschmack</span><div class="stars" data-metric="geschmack"><span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span></div></div>
            <div class="rating-row"><span>⚖️ Balance</span><div class="stars" data-metric="balance"><span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span></div></div>
            <div class="rating-row"><span>💥 Intensität</span><div class="stars" data-metric="intensitaet"><span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span></div></div>

            <textarea id="modalFazit" placeholder="Mein Fazit..."></textarea>

            <div class="modal-actions">
                <div class="main-actions">
                    <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
                    <button class="btn btn-primary" onclick="saveRatings()">Speichern</button>
                </div>
                <button id="deleteBtn" class="btn btn-danger" onclick="deleteRatings()" style="display: none;">Bewertung löschen</button>
            </div>
        </div>
    </div>

    <!-- Modal für Sorten hinzufügen -->
    <div class="modal-overlay" id="addFlavorOverlay">
        <div class="modal">
            <h2>Sorte manuell hinzufügen</h2>
            <p style="color: var(--text-muted); margin-bottom: 15px;">Füge eine neue Sorte zu dieser Kategorie hinzu.</p>
            <input type="hidden" id="addFlavorCatIndex">
            <div class="input-group">
                <label for="newFlavorName">Name der Sorte</label>
                <input type="text" id="newFlavorName" class="input-field" placeholder="z.B. Mango Monster">
            </div>
            <div class="input-group">
                <label for="newFlavorDesc">Beschreibung / Geschmack</label>
                <input type="text" id="newFlavorDesc" class="input-field" placeholder="z.B. Exotische Mango mit Lime-Kick">
            </div>
            <div class="modal-actions">
                <div class="main-actions">
                    <button class="btn btn-secondary" onclick="closeAddFlavorModal()">Abbrechen</button>
                    <button class="btn btn-primary" onclick="saveCustomFlavor()">Hinzufügen</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const baseDataset = [
            { 
                category: "⚡ HOLY Energy (Fokus & Energie)", prefix: "e",
                flavors: [
                    {id:"e1",name:"Raspberry Raptor",desc:"Himbeere & Yuzu"},
                    {id:"e2",name:"Citrus Cobra",desc:"Zitrusfrüchte & Kalamansi"},
                    {id:"e3",name:"Strawberry Shark",desc:"Erdbeere & Mandarine"},
                    {id:"e4",name:"Apple Alligator",desc:"Saurer Apfel"},
                    {id:"e5",name:"Cherry Cheetah",desc:"Kirsche"},
                    {id:"e6",name:"Watermelon Whale",desc:"Wassermelone"},
                    {id:"e7",name:"Pomegranate Piranha",desc:"Granatapfel"},
                    {id:"e8",name:"Fruity Frog",desc:"Verschiedene Früchte"}
                ] 
            },
            { 
                category: "🧊 HOLY Iced Tea (Echter Tee)", prefix: "t",
                flavors: [
                    {id:"t1",name:"Peach / White Peach",desc:"Pfirsich-Klassiker"},
                    {id:"t2",name:"Raspberry Vanilla",desc:"Himbeere & Vanille (Hibiskustee)"},
                    {id:"t3",name:"Lemon Honey",desc:"Zitrone & Honig (Schwarztee)"},
                    {id:"t4",name:"Mango Passion Fruit",desc:"Mango & Maracuja (Grüntee)"},
                    {id:"t5",name:"Lime Matcha",desc:"Limette & Matcha"},
                    {id:"t6",name:"Apple",desc:"Apfel (Grüntee)"},
                    {id:"t7",name:"Acai",desc:"Superfrucht Acai (Hibiskustee)"}
                ] 
            },
            { 
                category: "💧 HOLY Hydration (Sport & Elektrolyte)", prefix: "h",
                flavors: [
                    {id:"h1",name:"White Peach",desc:"Weißer Pfirsich"},
                    {id:"h2",name:"Strawberry Kiwi",desc:"Erdbeere & Kiwi"},
                    {id:"h3",name:"Coconut",desc:"Kokosnusswasser"},
                    {id:"h4",name:"Sour Cherry",desc:"Sauerkirsche"},
                    {id:"h5",name:"Lemon",desc:"Zitrone"},
                    {id:"h6",name:"Pineapple",desc:"Ananas"},
                    {id:"h7",name:"Pear",desc:"Birne"}
                ] 
            },
            { 
                category: "🥛 HOLY Milkshake (Cremig & Koffeinfrei)", prefix: "m",
                flavors: [
                    {id:"m1",name:"Vanille",desc:"Cremiger Vanille-Shake"},
                    {id:"m2",name:"Schoko",desc:"Cremiger Schoko-Shake"},
                    {id:"m3",name:"Erdbeere",desc:"Fruchtiger Erdbeer-Shake"}
                ] 
            }
        ];

        // Sicherheitsprüfungen beim Laden, um Rendering-Blockaden zu verhindern
        let userRatings = {};
        try { userRatings = JSON.parse(localStorage.getItem('holy_ratings')) || {}; } catch(e) { userRatings = {}; }
        
        let customFlavors = { e: [], t: [], h: [], m: [] };
        try { 
            let storedCustom = JSON.parse(localStorage.getItem('holy_custom_flavors'));
            if(storedCustom && typeof storedCustom === 'object' && storedCustom.e) {
                customFlavors = storedCustom;
            }
        } catch(e) { customFlavors = { e: [], t: [], h: [], m: [] }; }
        
        let currentFlavorId = null;
        let tempRatings = { geruch: 0, geschmack: 0, balance: 0, intensitaet: 0 };

        function getFullDataset() {
            return baseDataset.map(cat => {
                const addedFlavors = customFlavors[cat.prefix] || [];
                return { ...cat, flavors: [...cat.flavors, ...addedFlavors] };
            });
        }

        function renderApp() {
            const container = document.getElementById('app-content');
            if(!container) return;
            container.innerHTML = '';
            const fullDataset = getFullDataset();

            fullDataset.forEach((cat, index) => {
                const headerDiv = document.createElement('div');
                headerDiv.className = 'category-header';
                headerDiv.innerHTML = `
                    <div class="category-title">${cat.category}</div>
                    <button class="btn-add-flavor" onclick="openAddFlavorModal(${index})">➕ Hinzufügen</button>
                `;
                container.appendChild(headerDiv);

                const list = document.createElement('div');
                list.className = 'flavor-list';
                
                cat.flavors.forEach(f => {
                    const card = document.createElement('div');
                    card.className = 'flavor-card';
                    card.onclick = () => openModal(f.id, f.name, f.desc);
                    const isRated = userRatings[f.id] && (userRatings[f.id].geschmack > 0 || userRatings[f.id].fazit);
                    card.innerHTML = `<div class="flavor-info"><h3>${f.name}</h3><p>${f.desc}</p></div><div class="status-badge" style="display: ${isRated ? 'block' : 'none'}">${isRated ? (userRatings[f.id].geschmack || 0) + ' ★' : ''}</div>`;
                    list.appendChild(card);
                });
                container.appendChild(list);
            });
        }

        function openModal(id, name, desc) {
            currentFlavorId = id;
            document.getElementById('modalFlavorName').innerText = name;
            document.getElementById('modalFlavorDesc').innerText = desc;
            const existing = userRatings[id] || { geruch: 0, geschmack: 0, balance: 0, intensitaet: 0, fazit: "" };
            tempRatings = { ...existing };
            document.getElementById('modalFazit').value = existing.fazit || "";
            document.querySelectorAll('.stars').forEach(sc => updateStarsVisual(sc, tempRatings[sc.getAttribute('data-metric')]));
            
            const isRated = userRatings[id] && (userRatings[id].geschmack > 0 || userRatings[id].geruch > 0 || userRatings[id].fazit);
            document.getElementById('deleteBtn').style.display = isRated ? 'block' : 'none';
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        function openAddFlavorModal(catIndex) {
            document.getElementById('addFlavorCatIndex').value = catIndex;
            document.getElementById('newFlavorName').value = '';
            document.getElementById('newFlavorDesc').value = '';
            document.getElementById('addFlavorOverlay').style.display = 'flex';
        }

        function closeAddFlavorModal() { document.getElementById('addFlavorOverlay').style.display = 'none'; }

        function saveCustomFlavor() {
            const catIndex = document.getElementById('addFlavorCatIndex').value;
            const name = document.getElementById('newFlavorName').value.trim();
            const desc = document.getElementById('newFlavorDesc').value.trim();
            const prefix = baseDataset[catIndex].prefix;

            if(!name) { alert("Bitte gib einen Namen für die Sorte ein."); return; }

            const uniqueId = prefix + "_custom_" + Date.now();
            if(!customFlavors[prefix]) customFlavors[prefix] = [];
            customFlavors[prefix].push({ id: uniqueId, name: name, desc: desc || "Selbst hinzugefügt" });
            
            localStorage.setItem('holy_custom_flavors', JSON.stringify(customFlavors));
            closeAddFlavorModal();
            renderApp();
        }

        document.querySelectorAll('.star').forEach(star => {
            star.onclick = function() {
                const val = parseInt(this.getAttribute('data-value'));
                const container = this.parentElement;
                tempRatings[container.getAttribute('data-metric')] = val;
                updateStarsVisual(container, val);
            };
        });

        function updateStarsVisual(container, value) {
            container.querySelectorAll('.star').forEach(s => s.classList.toggle('active', parseInt(s.getAttribute('data-value')) <= value));
        }

        function saveRatings() {
            tempRatings.fazit = document.getElementById('modalFazit').value;
            userRatings[currentFlavorId] = { ...tempRatings };
            localStorage.setItem('holy_ratings', JSON.stringify(userRatings));
            closeModal(); renderApp();
        }

        function deleteRatings() {
            if(confirm("Möchtest du die Bewer
