<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLY Tasting App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --border: #e2e8f0;
            --star-active: #ffb300;
            --star-inactive: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
            text-align: center;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 800;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        .pwa-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 16px;
            width: 100%;
            display: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .category-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 24px 0 12px 0;
            color: var(--primary);
        }

        .flavor-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .flavor-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .flavor-info h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .flavor-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-badge {
            font-size: 0.75rem;
            background: #f0fdf4;
            color: #166534;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            border: 1px solid #bbf7d0;
            display: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 100;
        }

        .modal {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 24px 16px 40px 16px;
        }

        .rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .star {
            font-size: 1.6rem;
            color: var(--star-inactive);
            cursor: pointer;
        }

        .star.active {
            color: var(--star-active);
        }

        textarea {
            width: 100%;
            height: 80px;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            resize: none;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #f1f5f9; color: var(--text-main); }
    </style>
</head>
<body>

    <header>
        <h1>🥤 HOLY Tasting Tracker</h1>
    </header>

    <div class="container">
        <button id="installBtn" class="pwa-btn">📲 App auf dem Handy installieren</button>
        <div id="app-content"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalFlavorName">Sorte</h2>
            <p id="modalFlavorDesc" style="color: var(--text-muted); margin-bottom: 15px;"></p>
            
            <div class="rating-row"><span>👃 Geruch</span><div class="stars" data-metric="geruch"><span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span></div></div>
            <div class="rating-row"><span>👅 Geschmack</span><div class="stars" data-metric="geschmack"><span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span></div></div>
            <div class="rating-row"><span>⚖️ Balance</span><div class="stars" data-metric="balance"><span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span></div></div>
            <div class="rating-row"><span>💥 Intensität</span><div class="stars" data-metric="intensitaet"><span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span></div></div>

            <textarea id="modalFazit" placeholder="Mein Fazit..."></textarea>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
                <button class="btn btn-primary" onclick="saveRatings()">Speichern</button>
            </div>
        </div>
    </div>

    <script>
        const dataset = [
            { category: "⚡ HOLY Energy", flavors: [{id:"e1",name:"Raspberry Raptor",desc:"Himbeere x Yuzu"},{id:"e2",name:"Citrus Cobra",desc:"Zitrus x Kalamansi"},{id:"e3",name:"Strawberry Shark",desc:"Erdbeere x Mandarine"},{id:"e4",name:"Pomegranate Piranha",desc:"Granatapfel"},{id:"e5",name:"Fruity Frog",desc:"Mango x Maracuja x Ananas"},{id:"e6",name:"Apple Alligator",desc:"Saurer Apfel"},{id:"e7",name:"Watermelon Whale",desc:"Wassermelone"}] },
            { category: "🧊 HOLY Iced Tea", flavors: [{id:"t1",name:"Lemon Lizard",desc:"Schwarztee Zitrone"},{id:"t2",name:"Peach Panther",desc:"Schwarztee Pfirsich"},{id:"t3",name:"Pomegranate Panther",desc:"Schwarztee Granatapfel"},{id:"t4",name:"Acai Alligator",desc:"Grüntee Acai"},{id:"t5",name:"Cactus Cat",desc:"Grüntee Kaktusfeige"},{id:"t6",name:"Red Berry Bear",desc:"Früchtetee Rote Beeren"},{id:"t7",name:"Mint Monkey",desc:"Grüntee Marokkanische Minze"}] },
            { category: "💧 HOLY Hydration", flavors: [{id:"h1",name:"Yuzu Iguana",desc:"Yuzu x Lemongrass"},{id:"h2",name:"Cherry Cheetah",desc:"Sauerkirsche"},{id:"h3",name:"Tropical Tiger",desc:"Passionsfrucht x Mango"},{id:"h4",name:"Blueberry Bear",desc:"Blaue Himbeere"},{id:"h5",name:"Grapefruit Gecko",desc:"Pink Grapefruit"},{id:"h6",name:"Watermelon Wolf",desc:"Wassermelone"},{id:"h7",name:"Apple Ape",desc:"Grüner Apfel"}] },
            { category: "🥛 HOLY Milkshake", flavors: [{id:"m1",name:"Vanilla",desc:"Klassische Vanille"},{id:"m2",name:"Hazelnut",desc:"Geröstete Haselnuss"},{id:"m3",name:"Banana",desc:"Süße Banane"},{id:"m4",name:"Caramel",desc:"Karamell"},{id:"m5",name:"Strawberry",desc:"Erdbeere"}] }
        ];

        let userRatings = JSON.parse(localStorage.getItem('holy_ratings')) || {};
        let currentFlavorId = null;
        let tempRatings = { geruch: 0, geschmack: 0, balance: 0, intensitaet: 0 };

        function renderApp() {
            const container = document.getElementById('app-content');
            container.innerHTML = '';
            dataset.forEach(cat => {
                const title = document.createElement('div'); title.className = 'category-title'; title.innerText = cat.category; container.appendChild(title);
                const list = document.createElement('div'); list.className = 'flavor-list';
                cat.flavors.forEach(f => {
                    const card = document.createElement('div'); card.className = 'flavor-card'; card.onclick = () => openModal(f.id, f.name, f.desc);
                    const isRated = userRatings[f.id] && userRatings[f.id].geschmack > 0;
                    card.innerHTML = `<div class="flavor-info"><h3>${f.name}</h3><p>${f.desc}</p></div><div class="status-badge" style="display: ${isRated ? 'block' : 'none'}">${isRated ? userRatings[f.id].geschmack + ' ★' : ''}</div>`;
                    list.appendChild(card);
                });
                container.appendChild(list);
            });
        }

        function openModal(id, name, desc) {
            currentFlavorId = id;
            document.getElementById('modalFlavorName').innerText = name;
            document.getElementById('modalFlavorDesc').innerText = desc;
            const existing = userRatings[id] || { geruch: 0, geschmack: 0, balance: 0, intensitaet: 0, fazit: "" };
            tempRatings = { ...existing };
            document.getElementById('modalFazit').value = existing.fazit || "";
            document.querySelectorAll('.stars').forEach(sc => updateStarsVisual(sc, tempRatings[sc.getAttribute('data-metric')]));
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        document.querySelectorAll('.star').forEach(star => {
            star.onclick = function() {
                const val = parseInt(this.getAttribute('data-value'));
                const container = this.parentElement;
                tempRatings[container.getAttribute('data-metric')] = val;
                updateStarsVisual(container, val);
            };
        });

        function updateStarsVisual(container, value) {
            container.querySelectorAll('.star').forEach(s => s.classList.toggle('active', parseInt(s.getAttribute('data-value')) <= value));
        }

        function saveRatings() {
            tempRatings.fazit = document.getElementById('modalFazit').value;
            userRatings[currentFlavorId] = { ...tempRatings };
            localStorage.setItem('holy_ratings', JSON.stringify(userRatings));
            closeModal(); renderApp();
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').style.display = 'block'; });
        document.getElementById('installBtn').addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none'; deferredPrompt = null; } });

        renderApp();
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }
    </script>
</body>
</html>
